{% extends 'base.html' %}

{% block content %}

<form action="/search" method="POST">
    <input type="text" name="query" placeholder="Search by name or phone">
    <button type="submit">Search</button>
</form>

<table>
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    {% for contact in contacts %}
    <tr>
        <td>{{ contact.name }}</td>
        <td>{{ contact.phone }}</td>
        <td>{{ contact.email }}</td>
        <td>
            <a href="/edit/{{ contact.id }}">Edit</a>
            <a href="/delete/{{ contact.id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
