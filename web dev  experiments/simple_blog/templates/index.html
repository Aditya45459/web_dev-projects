{% extends 'base.html' %}

{% block content %}

<h2>📰 Latest Blog Posts</h2>

{% if posts %}
    {% for post in posts %}
    <div class="post">
        <h3>{{ post.title }}</h3>
        <p>{{ post.content }}</p>

        <div class="actions">
            <a href="/edit/{{ post.id }}" class="edit">Edit</a>
            <a href="/delete/{{ post.id }}" class="delete">Delete</a>
        </div>
    </div>
    {% endfor %}
{% else %}
    <p class="empty">No posts yet. Create your first post 🚀</p>
{% endif %}

{% endblock %}
