<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h2>Your Score 🎉</h2>

        <h3>{{ score }} / {{ total }}</h3>

        {% if score >= 3 %}
            <p>Good Job 👍</p>
        {% else %}
            <p>Try Again 😅</p>
        {% endif %}

        <a href="/quiz">
    <button>Retake Quiz</button>
</a>
    </div>
</body>
</html>
